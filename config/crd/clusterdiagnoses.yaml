apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: clusterdiagnoses.health.k8sai.io
spec:
  group: health.k8sai.io
  names:
    kind: ClusterDiagnosis
    listKind: ClusterDiagnosisList
    plural: clusterdiagnoses
    singular: clusterdiagnosis
    shortNames:
      - diagnosis
      - diagnoses
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Severity
          type: string
          jsonPath: .status.severity
        - name: Pod
          type: string
          jsonPath: .spec.targetRef.name
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [targetRef, failureType]
              properties:
                targetRef:
                  type: object
                  required: [kind, namespace, name]
                  properties:
                    kind: { type: string }
                    namespace: { type: string }
                    name: { type: string }
                failureType: { type: string }
                collectedAt: { type: string, format: date-time }
            status:
              type: object
              properties:
                phase: { type: string }
                rootCause: { type: string }
                severity: { type: string }
                recommendedFix: { type: string }
                model: { type: string }
                lastUpdated: { type: string, format: date-time }
                message: { type: string }
                observedFingerprint: { type: string }
                conditions:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true

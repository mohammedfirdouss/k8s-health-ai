# Optional HPA — requires metrics-server. Read docs/operations.md: multiple replicas
# do not shard work; leader election is off, so prefer replica: 1 unless you know why
# you need more pods (e.g. HA with coordinated leadership — not configured here).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: k8s-health-ai-manager
  namespace: k8s-health-ai-system
  labels:
    app: k8s-health-ai-manager
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: k8s-health-ai-manager
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80

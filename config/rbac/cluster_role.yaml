apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-health-ai-manager
rules:
  - apiGroups: [""]
    resources: ["pods", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: ["health.k8sai.io"]
    resources: ["clusterdiagnoses", "clusterdiagnoses/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

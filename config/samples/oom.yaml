apiVersion: v1
kind: Pod
metadata:
  name: sample-oom
  namespace: default
  labels:
    app: sample-oom
spec:
  restartPolicy: Always
  containers:
    - name: app
      image: polinux/stress:latest
      resources:
        limits:
          memory: "20Mi"
        requests:
          memory: "20Mi"
      command: ["stress"]
      args: ["--vm", "1", "--vm-bytes", "64M", "--vm-hang", "1"]
